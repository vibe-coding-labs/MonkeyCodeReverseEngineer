site_name: MonkeyCode 逆向工程分析全书
site_description: MonkeyCode AI 平台逆向工程与协议分析完整文档 — 从架构到协议到实现，系统化知识体系
site_author: CC11001100
site_url: https://vibe-coding-labs.github.io/MonkeyCodeReverseEngineer/
repo_name: MonkeyCodeReverseEngineer
repo_url: https://github.com/CC11001100/MonkeyCodeReverseEngineer
edit_uri: blob/main/docs/

theme:
  name: material
  language: zh
  icon:
    repo: fontawesome/brands/github
    logo: material/book-open-variant
  logo: assets/images/logo.png
  favicon: assets/images/favicon.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - navigation.expand
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
  palette:
    # 暗色模式 — 现代深蓝紫
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式
    # 亮色模式 — 清爽白/青
    - scheme: default
      primary: cyan
      accent: teal
      toggle:
        icon: material/weather-night
        name: 切换暗色模式

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      title: 目录

plugins:
  - search:
      lang:
        - zh
        - en
  - glightbox

exclude_docs: |
  README.old.md
  INDEX.md
  security/baizhi-security-test-2026-06-12.md
  superpowers/

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CC11001100
    - icon: fontawesome/solid/book
      link: https://vibe-coding-labs.github.io/MonkeyCodeReverseEngineer/
  generator: false

copyright: Copyright &copy; 2026 CC11001100 — 仅供研究学习用途

