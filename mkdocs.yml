site_name: MonkeyCode 逆向工程分析全书
site_description: MonkeyCode AI 平台逆向工程与协议分析完整文档
site_author: CC11001100
site_url: https://vibe-coding-labs.github.io/MonkeyCodeReverseEngineer/
repo_name: MonkeyCodeReverseEngineer
repo_url: https://github.com/CC11001100/MonkeyCodeReverseEngineer
edit_uri: blob/main/docs/

theme:
  name: material
  language: zh
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.annotate
    - content.code.copy
  palette:
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: 切换亮色模式
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: 切换暗色模式

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      title: 目录

plugins:
  - search:
      lang:
        - zh
        - en
  - glightbox

exclude_docs: |
  README.old.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CC11001100
  generator: false

copyright: Copyright &copy; 2026 CC11001100 — 仅供研究学习用途

